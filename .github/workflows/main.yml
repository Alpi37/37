name: Sync iFlows to Git & Deploy via SAP cTMS

on:
  workflow_dispatch:
    inputs:
      package_id:
        description: 'Package ID from Integration Suite'
        required: true

jobs:
  sync-build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      # 1. Authentifizierung gegen die Source Integration Suite (Entwicklung)
      - name: Get Bearer Token
        id: get-token
        env:
          BTP_CLIENT_ID: ${{ secrets.IAS_CLIENTID }}
          BTP_CLIENT_SECRET: ${{ secrets.IAS_CLIENTSECRET }}
        run: |
          RESPONSE=$(curl -s -X POST "${{ vars.BTP_TOKEN_URL }}" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            --data-urlencode "grant_type=client_credentials" \
            --data-urlencode "client_id=$BTP_CLIENT_ID" \
            --data-urlencode "client_secret=$BTP_CLIENT_SECRET")
          TOKEN=$(echo "$RESPONSE" | jq -r '.access_token')
          if [ "$TOKEN" == "null" ] || [ -z "$TOKEN" ]; then
            echo "Auth failed. Response: $RESPONSE"
            exit 1
          fi
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      # 2. iFlows als ZIP-Dateien aus SAP herunterladen und lokal entpacken (Jetzt voll-dynamisch)
      - name: Download iFlows from Integration Suite
        run: |
          PACKAGE_ID="${{ github.event.inputs.package_id }}"
          mkdir -p "iflows/$PACKAGE_ID"
          
          # FIX: Festcodierte URL durch ${{ vars.CPI_HOST }} ersetzt
          RESPONSE=$(curl -s \
            "${{ vars.CPI_HOST }}/api/v1/IntegrationPackages('$PACKAGE_ID')/IntegrationDesigntimeArtifacts" \
            -H "Authorization: Bearer ${{ steps.get-token.outputs.token }}" \
            -H "Accept: application/json")
          
          if [[ ! "$RESPONSE" == \{* ]]; then
            echo "Error: SAP did not return JSON. Response was:"
            echo "$RESPONSE"
            exit 1
          fi
          IFLOWS=$(echo "$RESPONSE" | jq -r '.d.results[].Id')
          if [ -z "$IFLOWS" ] || [ "$IFLOWS" == "null" ]; then
            echo "No iFlows found in package $PACKAGE_ID"
            exit 1
          fi
          for IFLOW_ID in $IFLOWS; do
            echo "Downloading: $IFLOW_ID"
            
            # FIX: Auch hier die festcodierte URL durch ${{ vars.CPI_HOST }} ersetzt
            curl -s \
              "${{ vars.CPI_HOST }}/api/v1/IntegrationDesigntimeArtifacts(Id='${IFLOW_ID}',Version='active')/\$value" \
              -H "Authorization: Bearer ${{ steps.get-token.outputs.token }}" \
              -o "iflows/$PACKAGE_ID/${IFLOW_ID}.zip"
            
            unzip -o "iflows/$PACKAGE_ID/${IFLOW_ID}.zip" -d "iflows/$PACKAGE_ID/${IFLOW_ID}"
            rm "iflows/$PACKAGE_ID/${IFLOW_ID}.zip"
          done

      # 3. Code-Änderungen als "Source of Truth" zurück in das Git-Repository pushen
      - name: Commit and Push
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "github-actions"
          git add iflows/
          if git diff --staged --quiet; then
            echo "No changes detected."
          else
            git commit -m "Sync iFlows from package ${{ github.event.inputs.package_id }}"
            git remote set-url origin https://x-access-token:${{ secrets.GHTOKEN }}@github.com/${{ github.repository }}
            git push
          fi

      # 4. Multi-Target Application (MTA) Archiv mit dem SAP Cloud MTA Build Tool bauen
      - name: Build MTA
        run: |
          npm install -g mbt
          mbt build -t gen

      # 5. Lokales MTAR-Artefakt zusätzlich in GitHub als Backup sichern
      - name: Upload MTAR as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: transport-package
          path: gen/*.mtar

      - name: Upload Built MTAR to cTMS Target Node
        env:
          TMS_CLIENT_ID: ${{ secrets.TMS_CLIENT_ID }}
          TMS_CLIENT_SECRET: ${{ secrets.TMS_CLIENT_SECRET }}
          TMS_TOKEN_URL: ${{ secrets.TMS_TOKEN_URL }}
          TMS_API_URL: ${{ vars.TMS_URL }}
          NODE_NAME: "ACX_TARGET"
        run: |
          echo "Requesting handshake token from Target cTMS instance..."
          
          TOKEN_RAW=$(curl -s -X POST "$TMS_TOKEN_URL" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            --data-urlencode "grant_type=client_credentials" \
            --data-urlencode "client_id=$TMS_CLIENT_ID" \
            --data-urlencode "client_secret=$TMS_CLIENT_SECRET")
          
          TMS_TOKEN=$(echo "$TOKEN_RAW" | jq -r '.access_token')
          if [ "$TMS_TOKEN" == "null" ] || [ -z "$TMS_TOKEN" ]; then
            echo "Authentication against Target cTMS endpoint failed. Details: $TOKEN_RAW"
            exit 1
          fi
          echo "::add-mask::$TMS_TOKEN"

          MTAR_FILE=$(ls gen/*.mtar | head -n 1)
          echo "Uploading compiled payload archive [$MTAR_FILE] to cTMS Node [$NODE_NAME]..."

          # Fixed: Reverted from /v2/files to the supported direct multipart upload endpoint
          UPLOAD_URI="${TMS_API_URL}/v1/nodes/upload"
          
          RESPONSE_FILE=$(mktemp)
          HTTP_CODE=$(curl -s -o "$RESPONSE_FILE" -w "%{http_code}" -X POST "$UPLOAD_URI" \
            -H "Authorization: Bearer $TMS_TOKEN" \
            -H "Accept: application/json" \
            -F "file=@$MTAR_FILE" \
            -F "nodeName=$NODE_NAME")

          BODY=$(cat "$RESPONSE_FILE")
          rm "$RESPONSE_FILE"

          echo "Gateway Return Code: $HTTP_CODE"
          echo "Gateway Body Response: $BODY"

          # Fixed: Accept both 200 OK and 201 Created as successful server responses
          if [ "$HTTP_CODE" -ne 201 ] && [ "$HTTP_CODE" -ne 200 ]; then
            echo "CRITICAL: The cTMS Gateway rejected the file upload package."
            echo "Double check that the 'Allow Content Upload' flag is set to true on Node $NODE_NAME inside your Target Subaccount."
            exit 1
          fi

          echo "SUCCESS: Integration package safely registered into the cTMS import queue!"

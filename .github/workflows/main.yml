name: SAP iFlow Sync & cTMS Deployment Pipeline

on:
  workflow_dispatch: # Ermöglicht den manuellen Start über die GitHub-Oberfläche
    inputs:
      iflow_id:
        description: 'Spezifische iFlow ID (leer lassen für alle/Standard)'
        required: false
        default: ''

jobs:
  sync-and-transport:
    runs-on: ubuntu-latest

    env:
      # SAP Integration Suite (CPI) Credentials / API
      CPI_HOST: "deine-cpi-tenant-api.cfapps.eu10.hana.ondemand.com"
      CPI_PACKAGE_ID: "DeinIntegrationPackage"
      CPI_IFLOW_ID: ${{ github.event.inputs.iflow_id || 'DeinStandardIFlow' }}
      
      # cTMS Credentials (aus dem Service Key extrahiert)
      CTMS_AUTH_URL: "https://dein-ctms-uaa.authentication.eu10.hana.ondemand.com/oauth/token"
      CTMS_API_URL: "https://transport-service-app-router.cfapps.eu10.hana.ondemand.com/v1"
      CTMS_NODE_NAME: "DEV_TO_TEST" # Dein definierter cTMS Node

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # -----------------------------------------
      # STEP 1: AUTHENTIFIZIERUNG AN SAP CPI / INTEGRATION SUITE
      # -----------------------------------------
      - name: Get SAP CPI OAuth Token
        id: cpi_auth
        run: |
          echo "Hole OAuth Token für Integration Suite..."
          RESPONSE=$(curl -s -X POST "${{ secrets.CPI_TOKEN_URL }}" \
            -u "${{ secrets.CPI_CLIENT_ID }}:${{ secrets.CPI_CLIENT_SECRET }}" \
            -d "grant_type=client_credentials")
          
          TOKEN=$(echo $RESPONSE | jq -r '.access_token')
          if [ "$TOKEN" = "null" ]; then echo "Fehler beim CPI-Auth"; exit 1; fi
          echo "::add-mask::$TOKEN"
          echo "cpi_token=$TOKEN" >> $GITHUB_OUTPUT

      # -----------------------------------------
      # STEP 2: IFLOW HERUNTERLADEN (EXPORT)
      # -----------------------------------------
      - name: Fetch iFlow Artifact (ZIP)
        run: |
          echo "Lade iFlow ${{ env.CPI_IFLOW_ID }} herunter..."
          
          # Ordnerstruktur vorbereiten
          mkdir -p iflows/${{ env.CPI_IFLOW_ID }}
          
          # API-Aufruf zum Download des iFlow-Bundles (ZIP)
          curl -s -X GET "https://${{ env.CPI_HOST }}/api/v1/IntegrationDesigntimeArtifacts(Id='${{ env.CPI_IFLOW_ID }}',Version='active')/\$value" \
            -H "Authorization: Bearer ${{ steps.cpi_auth.outputs.cpi_token }}" \
            --output iflows/${{ env.CPI_IFLOW_ID }}/${{ env.CPI_IFLOW_ID }}.zip

      # -----------------------------------------
      # STEP 3: REPO AKTUALISIEREN & PUSHEN
      # -----------------------------------------
      - name: Commit and Push to Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add iflows/
          
          # Nur committen, wenn es tatsächliche Änderungen gibt
          if git diff --staged --quiet; then
            echo "Keine Änderungen am iFlow festgestellt."
          else
            git commit -m "Automated Sync: iFlow ${{ env.CPI_IFLOW_ID }} aktualisiert [skip ci]"
            git push origin main
          fi

      # -----------------------------------------
      # STEP 4: AUTHENTIFIZIERUNG AM SAP cTMS
      # -----------------------------------------
      - name: Get SAP cTMS OAuth Token
        id: ctms_auth
        run: |
          echo "Hole OAuth Token für SAP cTMS..."
          RESPONSE=$(curl -s -X POST "${{ env.CTMS_AUTH_URL }}" \
            -u "${{ secrets.CTMS_CLIENT_ID }}:${{ secrets.CTMS_CLIENT_SECRET }}" \
            -d "grant_type=client_credentials")
          
          TOKEN=$(echo $RESPONSE | jq -r '.access_token')
          if [ "$TOKEN" = "null" ]; then echo "Fehler beim cTMS-Auth"; exit 1; fi
          echo "::add-mask::$TOKEN"
          echo "ctms_token=$TOKEN" >> $GITHUB_OUTPUT

      # -----------------------------------------
      # STEP 5: ARTEFAKT IN cTMS HOCHLADEN & DER QUEUE HINZUFÜGEN
      # -----------------------------------------
      - name: Upload Artifact and Inject into cTMS Queue
        run: |
          FILE_PATH="iflows/${{ env.CPI_IFLOW_ID }}/${{ env.CPI_IFLOW_ID }}.zip"
          echo "Füge $FILE_PATH der cTMS-Queue für Node ${{ env.CTMS_NODE_NAME }} hinzu..."
          
          # 1. Datei hochladen, um eine File-ID zu generieren
          UPLOAD_RESPONSE=$(curl -s -X POST "${{ env.CTMS_API_URL }}/files" \
            -H "Authorization: Bearer ${{ steps.ctms_auth.outputs.ctms_token }}" \
            -F "file=@$FILE_PATH")
          
          FILE_ID=$(echo $UPLOAD_RESPONSE | jq -r '.fileId')
          echo "Datei erfolgreich hochgeladen. cTMS File ID: $FILE_ID"
          
          # 2. Transport-Request erstellen und in die Queue des Ziel-Nodes schieben
          NODES_JSON=$(jq -n --arg node "${{ env.CTMS_NODE_NAME }}" '[$node]')
          
          REQ_BODY=$(jq -n \
            --arg desc "GitHub Deployment: iFlow ${{ env.CPI_IFLOW_ID }}" \
            --arg fileId "$FILE_ID" \
            --argjson nodes "$NODES_JSON" \
            '{description: $desc, fileId: $fileId, nodeNames: $nodes}')
            
          QUEUE_RESPONSE=$(curl -s -X POST "${{ env.CTMS_API_URL }}/nodes/upload" \
            -H "Authorization: Bearer ${{ steps.ctms_auth.outputs.ctms_token }}" \
            -H "Content-Type: application/json" \
            -d "$REQ_BODY")
          
          echo "cTMS Queue Response:"
          echo $QUEUE_RESPONSE | jq .

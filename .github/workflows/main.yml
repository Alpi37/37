name: Sync iFlows, Partner Directory & Deploy via SAP cTMS

on:
  workflow_dispatch:
    inputs:
      package_id:
        description: 'Package ID aus der Integration Suite (z.B. AY)'
        required: false
        default: 'AY'
      include_sensitive_partner_directory:
        description: 'Also export/import BinaryParameters and UserCredentialParameters'
        required: false
        default: 'false'
      import_partner_directory_to_target:
        description: 'Import Partner Directory into target CPI after cTMS export'
        required: false
        default: 'true'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync-build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # --- #1 REPOSITORY AUSCHECKEN ---
      - name: "#1 Checkout this repo"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # --- #2 AUTHENTIFIZIERUNG GEGEN SOURCE CPI ---
      - name: "#2 Get Bearer Token for Source CPI"
        id: get-token
        env:
          BTP_CLIENT_ID: ${{ secrets.IAS_CLIENTID }}
          BTP_CLIENT_SECRET: ${{ secrets.IAS_CLIENTSECRET }}
          TOKEN_URL: ${{ vars.BTP_TOKEN_URL }}
        run: |
          RESPONSE=$(curl -s -X POST "$TOKEN_URL" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            --data-urlencode "grant_type=client_credentials" \
            --data-urlencode "client_id=$BTP_CLIENT_ID" \
            --data-urlencode "client_secret=$BTP_CLIENT_SECRET")

          TOKEN=$(echo "$RESPONSE" | jq -r '.access_token')
          if [ "$TOKEN" == "null" ] || [ -z "$TOKEN" ]; then
            echo "CRITICAL: Auth an Source CPI fehlgeschlagen. Response: $RESPONSE"
            exit 1
          fi

          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      # --- #3 IFLOWS / ARTEFAKTE AUS SOURCE CPI HERUNTERLADEN ---
      - name: "#3 Download Artifacts from Integration Suite"
        env:
          CPI_HOST: ${{ vars.CPI_HOST }}
        run: |
          PACKAGE_ID="${{ github.event.inputs.package_id }}"
          TOKEN="${{ steps.get-token.outputs.token }}"
          mkdir -p "iflows/$PACKAGE_ID"

          declare -A ENDPOINTS=(
            ["IntegrationDesigntimeArtifacts"]="IntegrationDesigntimeArtifacts"
            ["MessageMappingDesigntimeArtifacts"]="MessageMappingDesigntimeArtifacts"
            ["ValueMappingDesigntimeArtifacts"]="ValueMappingDesigntimeArtifacts"
            ["ScriptCollectionDesigntimeArtifacts"]="ScriptCollectionDesigntimeArtifacts"
            ["MessageTypeDesigntimeArtifacts"]="MessageTypeDesigntimeArtifacts"
            ["FaultMessageTypeDesigntimeArtifacts"]="FaultMessageTypeDesigntimeArtifacts"
            ["DataTypeDesigntimeArtifacts"]="DataTypeDesigntimeArtifacts"
            ["ServiceInterfaceDesigntimeArtifacts"]="ServiceInterfaceDesigntimeArtifacts"
          )

          TOTAL_DOWNLOADED=0

          for ENTITY_SET in "${!ENDPOINTS[@]}"; do
            DOWNLOAD_BASE="${ENDPOINTS[$ENTITY_SET]}"

            RESPONSE=$(curl -s \
              "${CPI_HOST}/api/v1/IntegrationPackages('${PACKAGE_ID}')/${ENTITY_SET}" \
              -H "Authorization: Bearer $TOKEN" \
              -H "Accept: application/json")

            if [[ ! "$RESPONSE" == \{* ]]; then
              echo "WARNING: Kein valides JSON von [$ENTITY_SET] - ueberspringe."
              continue
            fi

            ARTIFACT_IDS=$(echo "$RESPONSE" | jq -r '.d.results[].Id' 2>/dev/null)
            if [ -z "$ARTIFACT_IDS" ]; then
              echo "Keine Artefakte in [$ENTITY_SET]."
              continue
            fi

            while IFS= read -r ARTIFACT_ID; do
              [ -z "$ARTIFACT_ID" ] && continue
              echo "Lade: $ARTIFACT_ID ($ENTITY_SET)"

              RESPONSE_FILE=$(mktemp)
              HTTP_CODE=$(curl -s -o "$RESPONSE_FILE" -w "%{http_code}" \
                "${CPI_HOST}/api/v1/${DOWNLOAD_BASE}(Id='${ARTIFACT_ID}',Version='active')/\$value" \
                -H "Authorization: Bearer $TOKEN")

              if [ "$HTTP_CODE" -ne 200 ]; then
                echo "WARNING: Download fehlgeschlagen fuer [$ARTIFACT_ID] - HTTP $HTTP_CODE"
                rm -f "$RESPONSE_FILE"
                continue
              fi

              mv "$RESPONSE_FILE" "iflows/$PACKAGE_ID/${ARTIFACT_ID}.zip"
              unzip -o "iflows/$PACKAGE_ID/${ARTIFACT_ID}.zip" \
                -d "iflows/$PACKAGE_ID/${ARTIFACT_ID}" > /dev/null 2>&1
              rm "iflows/$PACKAGE_ID/${ARTIFACT_ID}.zip"

              TOTAL_DOWNLOADED=$((TOTAL_DOWNLOADED + 1))
            done <<< "$ARTIFACT_IDS"
          done

          if [ "$TOTAL_DOWNLOADED" -eq 0 ]; then
            echo "CRITICAL: Keine Artefakte im Paket $PACKAGE_ID gefunden."
            exit 1
          fi

      # --- #4 PARTNER DIRECTORY AUS SOURCE CPI HERUNTERLADEN ---
      - name: "#4 Download Partner Directory from Source CPI"
        env:
          CPI_HOST: ${{ vars.CPI_HOST }}
        run: |
          PACKAGE_ID="${{ github.event.inputs.package_id }}"
          TOKEN="${{ steps.get-token.outputs.token }}"
          INCLUDE_SENSITIVE="${{ github.event.inputs.include_sensitive_partner_directory }}"
          OUT_DIR="partner-directory/$PACKAGE_ID"

          rm -rf "$OUT_DIR"
          mkdir -p "$OUT_DIR/parameters"

          fetch_collection() {
            local endpoint="$1"
            local output_file="$2"
            shift 2

            echo "Lade Partner Directory EntitySet [$endpoint]..."
            HTTP_CODE=$(curl -s -G -o "$output_file.tmp" -w "%{http_code}" \
              "${CPI_HOST}/api/v1/${endpoint}" \
              -H "Authorization: Bearer $TOKEN" \
              -H "Accept: application/json" \
              "$@" \
              --data-urlencode "\$top=1000")

            if [ "$HTTP_CODE" -ne 200 ]; then
              echo "WARNING: [$endpoint] konnte nicht geladen werden (HTTP $HTTP_CODE)."
              cat "$output_file.tmp"
              rm -f "$output_file.tmp"
              echo "[]" > "$output_file"
              return 0
            fi

            jq '.d.results // []' "$output_file.tmp" > "$output_file"
            rm -f "$output_file.tmp"
          }

          fetch_collection "Partners" "$OUT_DIR/partners.json"
          fetch_collection "AlternativePartners" "$OUT_DIR/alternative-partners.json"
          fetch_collection "AuthorizedUsers" "$OUT_DIR/authorized-users.json"

          PARTNER_IDS=$(jq -r '.[].Pid // empty' "$OUT_DIR/partners.json")

          while IFS= read -r PID; do
            [ -z "$PID" ] && continue
            SAFE_PID=$(echo "$PID" | tr -c 'A-Za-z0-9_.-' '_')

            fetch_collection "StringParameters" \
              "$OUT_DIR/parameters/${SAFE_PID}-string-parameters.json" \
              --data-urlencode "\$filter=Pid eq '$PID'"

            if [ "$INCLUDE_SENSITIVE" = "true" ]; then
              fetch_collection "BinaryParameters" \
                "$OUT_DIR/parameters/${SAFE_PID}-binary-parameters.json" \
                --data-urlencode "\$filter=Pid eq '$PID'"

              fetch_collection "UserCredentialParameters" \
                "$OUT_DIR/parameters/${SAFE_PID}-user-credential-parameters.json" \
                --data-urlencode "\$filter=Pid eq '$PID'"
            fi
          done <<< "$PARTNER_IDS"

          jq -n \
            --arg packageId "$PACKAGE_ID" \
            --arg includeSensitive "$INCLUDE_SENSITIVE" \
            '{
              packageId: $packageId,
              tenantWide: true,
              note: "Partner Directory is tenant-wide CPI data exported through the OData API. It is committed to GitHub and imported into target CPI with a separate API step.",
              includeSensitivePartnerDirectory: ($includeSensitive == "true")
            }' > "$OUT_DIR/manifest.json"

      # --- #5 IFLOWS + PARTNER DIRECTORY NACH GITHUB PUSHEN ---
      - name: "#5 Commit and Push changes to GitHub"
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "github-actions"
          git add iflows/ partner-directory/

          if git diff --staged --quiet; then
            echo "Keine Aenderungen an iFlows oder Partner Directory festgestellt. Ueberspringe Push."
          else
            git commit -m "Sync CPI content and partner directory from package ${{ github.event.inputs.package_id }} [skip ci]"
            git remote set-url origin https://x-access-token:${{ secrets.GHTOKEN }}@github.com/${{ github.repository }}.git
            git pull origin main --rebase
            git push origin main
          fi

      # --- #6 PACKAGE VIA CAS NACH CTMS EXPORTIEREN ---
      - name: "#6 Export Package via CAS and push to cTMS"
        env:
          CAS_CLIENT_ID: ${{ secrets.CAS_CLIENT_ID }}
          CAS_CLIENT_SECRET: ${{ secrets.CAS_CLIENT_SECRET }}
          CAS_TOKEN_URL: ${{ vars.CAS_TOKEN_URL }}
          CAS_API_URL: ${{ vars.CAS_API_URL }}
        run: |
          PACKAGE_ID="${{ github.event.inputs.package_id }}"
          RUN_NUMBER="${{ github.run_number }}"
          mkdir -p gen

          CAS_TOKEN_RAW=$(curl -s -X POST "$CAS_TOKEN_URL" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            --data-urlencode "grant_type=client_credentials" \
            --data-urlencode "client_id=$CAS_CLIENT_ID" \
            --data-urlencode "client_secret=$CAS_CLIENT_SECRET")

          CAS_TOKEN=$(echo "$CAS_TOKEN_RAW" | jq -r '.access_token')
          if [ "$CAS_TOKEN" == "null" ] || [ -z "$CAS_TOKEN" ]; then
            echo "CRITICAL: CAS Auth fehlgeschlagen: $CAS_TOKEN_RAW"
            exit 1
          fi

          RESOURCES_RESPONSE=$(curl -s \
            "${CAS_API_URL}/v1/contentResources" \
            -H "Authorization: Bearer $CAS_TOKEN" \
            -H "Accept: application/json")

          RESOURCE_ID=$(echo "$RESOURCES_RESPONSE" | jq -r --arg pkg "$PACKAGE_ID" '.contentResources[] | select(.id == $pkg) | .resourceID')
          RESOURCE_TYPE=$(echo "$RESOURCES_RESPONSE" | jq -r --arg pkg "$PACKAGE_ID" '.contentResources[] | select(.id == $pkg) | .type')
          RESOURCE_SUBTYPE=$(echo "$RESOURCES_RESPONSE" | jq -r --arg pkg "$PACKAGE_ID" '.contentResources[] | select(.id == $pkg) | .subType')
          RESOURCE_NAME=$(echo "$RESOURCES_RESPONSE" | jq -r --arg pkg "$PACKAGE_ID" '.contentResources[] | select(.id == $pkg) | .name')

          if [ -z "$RESOURCE_ID" ] || [ "$RESOURCE_ID" == "null" ]; then
            echo "CRITICAL: Paket [$PACKAGE_ID] nicht in CAS contentResources gefunden."
            echo "$RESOURCES_RESPONSE" | jq -r '.contentResources[] | "\(.id) | \(.type)/\(.subType) | \(.resourceID)"'
            exit 1
          fi

          EXPORT_PAYLOAD=$(jq -n \
            --arg id "gh-${PACKAGE_ID}-${RUN_NUMBER}" \
            --arg pkg "$PACKAGE_ID" \
            --arg name "$RESOURCE_NAME" \
            --arg resourceId "$RESOURCE_ID" \
            --arg type "$RESOURCE_TYPE" \
            --arg subType "$RESOURCE_SUBTYPE" \
            --arg runNum "$RUN_NUMBER" \
            '{
              "id": $id,
              "exportType": "MTAR",
              "exportMode": "TransportManagementService",
              "exportMediaType": "MTAR",
              "sourceNode": "ACX_SOURCE",
              "version": ("1.0." + $runNum),
              "description": ("GitHub Actions - Run " + $runNum),
              "requestor": "GitHub Actions",
              "contentResources": [{
                "resourceID": $resourceId,
                "type": $type,
                "subType": $subType,
                "id": $pkg,
                "name": $name,
                "version": ("1.0." + $runNum)
              }]
            }')

          EXPORT_RESPONSE=$(curl -s -X POST "${CAS_API_URL}/v1/contentResources/export" \
            -H "Authorization: Bearer $CAS_TOKEN" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json" \
            -d "$EXPORT_PAYLOAD")

          ACTIVITY_ID=$(echo "$EXPORT_RESPONSE" | jq -r '.activityId // empty')
          if [ -z "$ACTIVITY_ID" ] || [ "$ACTIVITY_ID" == "null" ]; then
            echo "CRITICAL: Keine activityId von CAS erhalten."
            echo "$EXPORT_RESPONSE"
            exit 1
          fi

          MAX_ATTEMPTS=30
          SLEEP_SECONDS=20
          STATE="UNKNOWN"

          for i in $(seq 1 $MAX_ATTEMPTS); do
            echo "Poll $i/$MAX_ATTEMPTS - warte ${SLEEP_SECONDS}s..."
            sleep $SLEEP_SECONDS

            POLL_RESPONSE=$(curl -s \
              "${CAS_API_URL}/v1/operations/${ACTIVITY_ID}" \
              -H "Authorization: Bearer $CAS_TOKEN" \
              -H "Accept: application/json")

            STATE=$(echo "$POLL_RESPONSE" | jq -r '.state // empty')
            PROGRESS=$(echo "$POLL_RESPONSE" | jq -r '.progress // "?"')
            echo "State: $STATE | Progress: ${PROGRESS}%"

            if [ "$STATE" == "FINISHED" ] || [ "$STATE" == "WARNING" ]; then
              break
            elif [ "$STATE" == "ERROR" ] || [ "$STATE" == "ABORTED" ]; then
              echo "CRITICAL: CAS Export fehlgeschlagen."
              echo "$POLL_RESPONSE"
              exit 1
            fi
          done

          if [ "$STATE" != "FINISHED" ] && [ "$STATE" != "WARNING" ]; then
            echo "CRITICAL: Timeout nach $((MAX_ATTEMPTS * SLEEP_SECONDS))s. Letzter State: $STATE"
            exit 1
          fi

          CONFIG_RESPONSE=$(curl -s \
            "${CAS_API_URL}/v1/operations/${ACTIVITY_ID}/config" \
            -H "Authorization: Bearer $CAS_TOKEN" \
            -H "Accept: application/json")

          FILE_ID=$(echo "$CONFIG_RESPONSE" | jq -r '.fileID // empty')
          TR_ID=$(echo "$CONFIG_RESPONSE" | jq -r '.transportRequestID // "N/A"')
          TR_URL=$(echo "$CONFIG_RESPONSE" | jq -r '.transportRequestURL // "N/A"')

          echo "cTMS Transport-Request ID : $TR_ID"
          echo "cTMS Transport-Request URL: $TR_URL"

          if [ -n "$FILE_ID" ] && [ "$FILE_ID" != "null" ]; then
            MTAR_FILE="gen/${PACKAGE_ID}-1.0.${RUN_NUMBER}.mtar"

            HTTP_CODE=$(curl -s -o "$MTAR_FILE" -w "%{http_code}" \
              "${CAS_API_URL}/v1/operations/${ACTIVITY_ID}/file/${FILE_ID}" \
              -H "Authorization: Bearer $CAS_TOKEN" \
              -H "Accept: application/octet-stream")

            if [ "$HTTP_CODE" -ne 200 ]; then
              echo "WARNING: MTAR-Download fehlgeschlagen (HTTP $HTTP_CODE)."
              rm -f "$MTAR_FILE"
            else
              unzip -l "$MTAR_FILE"
              ls -la gen/*.mtar
            fi
          fi

      # --- #7 PARTNER DIRECTORY IN TARGET CPI IMPORTIEREN ---
      - name: "#7 Import Partner Directory into Target CPI"
        if: ${{ github.event.inputs.import_partner_directory_to_target == 'true' }}
        env:
          TARGET_CLIENT_ID: ${{ secrets.TARGET_IAS_CLIENTID }}
          TARGET_CLIENT_SECRET: ${{ secrets.TARGET_IAS_CLIENTSECRET }}
          TARGET_TOKEN_URL: ${{ vars.TARGET_BTP_TOKEN_URL }}
          TARGET_CPI_HOST: ${{ vars.TARGET_CPI_HOST }}
        run: |
          PACKAGE_ID="${{ github.event.inputs.package_id }}"
          IN_DIR="partner-directory/$PACKAGE_ID"

          if [ ! -d "$IN_DIR" ]; then
            echo "CRITICAL: Partner Directory Export nicht gefunden: $IN_DIR"
            exit 1
          fi

          TARGET_TOKEN_RAW=$(curl -s -X POST "$TARGET_TOKEN_URL" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            --data-urlencode "grant_type=client_credentials" \
            --data-urlencode "client_id=$TARGET_CLIENT_ID" \
            --data-urlencode "client_secret=$TARGET_CLIENT_SECRET")

          TARGET_TOKEN=$(echo "$TARGET_TOKEN_RAW" | jq -r '.access_token')
          if [ "$TARGET_TOKEN" == "null" ] || [ -z "$TARGET_TOKEN" ]; then
            echo "CRITICAL: Auth an Target CPI fehlgeschlagen: $TARGET_TOKEN_RAW"
            exit 1
          fi

          CSRF_HEADERS=$(mktemp)
          COOKIE_JAR=$(mktemp)

          curl -s -o /dev/null -D "$CSRF_HEADERS" -c "$COOKIE_JAR" \
            "${TARGET_CPI_HOST}/api/v1/" \
            -H "Authorization: Bearer $TARGET_TOKEN" \
            -H "X-CSRF-Token: Fetch"

          CSRF_TOKEN=$(awk 'tolower($1) == "x-csrf-token:" {print $2}' "$CSRF_HEADERS" | tr -d '\r')
          if [ -z "$CSRF_TOKEN" ]; then
            echo "CRITICAL: Kein CSRF Token von Target CPI erhalten."
            cat "$CSRF_HEADERS"
            exit 1
          fi

          urlenc() {
            jq -rn --arg v "$1" '$v|@uri'
          }

          odata_key() {
            local escaped
            escaped=$(printf "%s" "$1" | sed "s/'/''/g")
            urlenc "$escaped"
          }

          fail_on_auth_error() {
            local code="$1"
            local action="$2"

            if [ "$code" = "401" ] || [ "$code" = "403" ]; then
              echo "CRITICAL: Keine Berechtigung fuer [$action] in Target CPI. HTTP $code"
              echo "Bitte TARGET_IAS_CLIENTID / Role Collections / Target CPI API-Rechte pruefen."
              exit 1
            fi
          }

          api_post() {
            local endpoint="$1"
            local body="$2"
            local response_file
            response_file=$(mktemp)

            HTTP_CODE=$(curl -s -o "$response_file" -w "%{http_code}" \
              -X POST "${TARGET_CPI_HOST}/api/v1/${endpoint}" \
              -b "$COOKIE_JAR" \
              -H "Authorization: Bearer $TARGET_TOKEN" \
              -H "X-CSRF-Token: $CSRF_TOKEN" \
              -H "Content-Type: application/json" \
              -H "Accept: application/json" \
              -d "$body")

            echo "$HTTP_CODE"
            cat "$response_file" >&2
            rm -f "$response_file"
          }

          api_put() {
            local endpoint="$1"
            local body="$2"
            local response_file
            response_file=$(mktemp)

            HTTP_CODE=$(curl -s -o "$response_file" -w "%{http_code}" \
              -X PUT "${TARGET_CPI_HOST}/api/v1/${endpoint}" \
              -b "$COOKIE_JAR" \
              -H "Authorization: Bearer $TARGET_TOKEN" \
              -H "X-CSRF-Token: $CSRF_TOKEN" \
              -H "Content-Type: application/json" \
              -H "Accept: application/json" \
              -d "$body")

            echo "$HTTP_CODE"
            cat "$response_file" >&2
            rm -f "$response_file"
          }

          echo "Importiere Partners..."
          jq -c '.[]' "$IN_DIR/partners.json" | while read -r row; do
            PID=$(echo "$row" | jq -r '.Pid')
            BODY=$(jq -n --arg Pid "$PID" '{Pid: $Pid}')

            HTTP_CODE=$(api_post "Partners" "$BODY")
            fail_on_auth_error "$HTTP_CODE" "POST Partners"

            if [[ "$HTTP_CODE" =~ ^2 ]]; then
              echo "Partner angelegt: $PID"
            else
              echo "Partner existiert bereits oder konnte nicht angelegt werden: $PID"
            fi
          done

          echo "Importiere AlternativePartners..."
          jq -c '.[]' "$IN_DIR/alternative-partners.json" | while read -r row; do
            AGENCY=$(echo "$row" | jq -r '.Agency')
            SCHEME=$(echo "$row" | jq -r '.Scheme')
            ID=$(echo "$row" | jq -r '.Id')
            PID=$(echo "$row" | jq -r '.Pid')
            HEXAGENCY=$(echo "$row" | jq -r '.Hexagency')
            HEXSCHEME=$(echo "$row" | jq -r '.Hexscheme')
            HEXID=$(echo "$row" | jq -r '.Hexid')

            CREATE_BODY=$(jq -n \
              --arg Agency "$AGENCY" \
              --arg Scheme "$SCHEME" \
              --arg Id "$ID" \
              --arg Pid "$PID" \
              '{Agency: $Agency, Scheme: $Scheme, Id: $Id, Pid: $Pid}')

            UPDATE_BODY=$(jq -n --arg Pid "$PID" '{Pid: $Pid}')

            HTTP_CODE=$(api_post "AlternativePartners" "$CREATE_BODY")
            fail_on_auth_error "$HTTP_CODE" "POST AlternativePartners"

            if [[ "$HTTP_CODE" =~ ^2 ]]; then
              echo "AlternativePartner angelegt: $AGENCY / $SCHEME / $ID"
            else
              KEY="AlternativePartners(Hexagency='$(odata_key "$HEXAGENCY")',Hexscheme='$(odata_key "$HEXSCHEME")',Hexid='$(odata_key "$HEXID")')"
              PUT_CODE=$(api_put "$KEY" "$UPDATE_BODY")
              fail_on_auth_error "$PUT_CODE" "PUT AlternativePartners"

              if [[ "$PUT_CODE" =~ ^2 ]]; then
                echo "AlternativePartner aktualisiert: $AGENCY / $SCHEME / $ID"
              else
                echo "WARNING: AlternativePartner konnte nicht importiert werden: $AGENCY / $SCHEME / $ID"
              fi
            fi
          done

          echo "Importiere AuthorizedUsers..."
          jq -c '.[]' "$IN_DIR/authorized-users.json" | while read -r row; do
            USER_ID=$(echo "$row" | jq -r '.User')
            PID=$(echo "$row" | jq -r '.Pid')

            CREATE_BODY=$(jq -n --arg User "$USER_ID" --arg Pid "$PID" '{User: $User, Pid: $Pid}')
            UPDATE_BODY=$(jq -n --arg Pid "$PID" '{Pid: $Pid}')

            HTTP_CODE=$(api_post "AuthorizedUsers" "$CREATE_BODY")
            fail_on_auth_error "$HTTP_CODE" "POST AuthorizedUsers"

            if [[ "$HTTP_CODE" =~ ^2 ]]; then
              echo "AuthorizedUser angelegt: $USER_ID"
            else
              KEY="AuthorizedUsers('$(odata_key "$USER_ID")')"
              PUT_CODE=$(api_put "$KEY" "$UPDATE_BODY")
              fail_on_auth_error "$PUT_CODE" "PUT AuthorizedUsers"

              if [[ "$PUT_CODE" =~ ^2 ]]; then
                echo "AuthorizedUser aktualisiert: $USER_ID"
              else
                echo "WARNING: AuthorizedUser konnte nicht importiert werden: $USER_ID"
              fi
            fi
          done

          echo "Importiere StringParameters..."
          find "$IN_DIR/parameters" -name '*-string-parameters.json' -print | while read -r file; do
            jq -c '.[]' "$file" | while read -r row; do
              PID=$(echo "$row" | jq -r '.Pid')
              ID=$(echo "$row" | jq -r '.Id')
              VALUE=$(echo "$row" | jq -r '.Value')

              CREATE_BODY=$(jq -n \
                --arg Pid "$PID" \
                --arg Id "$ID" \
                --arg Value "$VALUE" \
                '{Pid: $Pid, Id: $Id, Value: $Value}')

              UPDATE_BODY=$(jq -n --arg Value "$VALUE" '{Value: $Value}')

              HTTP_CODE=$(api_post "StringParameters" "$CREATE_BODY")
              fail_on_auth_error "$HTTP_CODE" "POST StringParameters"

              if [[ "$HTTP_CODE" =~ ^2 ]]; then
                echo "StringParameter angelegt: $PID / $ID"
              else
                KEY="StringParameters(Pid='$(odata_key "$PID")',Id='$(odata_key "$ID")')"
                PUT_CODE=$(api_put "$KEY" "$UPDATE_BODY")
                fail_on_auth_error "$PUT_CODE" "PUT StringParameters"

                if [[ "$PUT_CODE" =~ ^2 ]]; then
                  echo "StringParameter aktualisiert: $PID / $ID"
                else
                  echo "WARNING: StringParameter konnte nicht importiert werden: $PID / $ID"
                fi
              fi
            done
          done

          echo "Importiere BinaryParameters, falls exportiert..."
          find "$IN_DIR/parameters" -name '*-binary-parameters.json' -print | while read -r file; do
            jq -c '.[]' "$file" | while read -r row; do
              PID=$(echo "$row" | jq -r '.Pid')
              ID=$(echo "$row" | jq -r '.Id')
              CONTENT_TYPE=$(echo "$row" | jq -r '.ContentType')
              VALUE=$(echo "$row" | jq -r '.Value')

              CREATE_BODY=$(jq -n \
                --arg Pid "$PID" \
                --arg Id "$ID" \
                --arg ContentType "$CONTENT_TYPE" \
                --arg Value "$VALUE" \
                '{Pid: $Pid, Id: $Id, ContentType: $ContentType, Value: $Value}')

              UPDATE_BODY=$(jq -n \
                --arg ContentType "$CONTENT_TYPE" \
                --arg Value "$VALUE" \
                '{ContentType: $ContentType, Value: $Value}')

              HTTP_CODE=$(api_post "BinaryParameters" "$CREATE_BODY")
              fail_on_auth_error "$HTTP_CODE" "POST BinaryParameters"

              if [[ "$HTTP_CODE" =~ ^2 ]]; then
                echo "BinaryParameter angelegt: $PID / $ID"
              else
                KEY="BinaryParameters(Pid='$(odata_key "$PID")',Id='$(odata_key "$ID")')"
                PUT_CODE=$(api_put "$KEY" "$UPDATE_BODY")
                fail_on_auth_error "$PUT_CODE" "PUT BinaryParameters"

                if [[ "$PUT_CODE" =~ ^2 ]]; then
                  echo "BinaryParameter aktualisiert: $PID / $ID"
                else
                  echo "WARNING: BinaryParameter konnte nicht importiert werden: $PID / $ID"
                fi
              fi
            done
          done

          echo "Importiere UserCredentialParameters, falls exportiert..."
          find "$IN_DIR/parameters" -name '*-user-credential-parameters.json' -print | while read -r file; do
            jq -c '.[]' "$file" | while read -r row; do
              PID=$(echo "$row" | jq -r '.Pid')
              ID=$(echo "$row" | jq -r '.Id')
              USER_VALUE=$(echo "$row" | jq -r '.User')
              PASSWORD_VALUE=$(echo "$row" | jq -r '.Password // empty')

              if [ -z "$PASSWORD_VALUE" ]; then
                echo "WARNING: UserCredentialParameter ohne Password wird uebersprungen: $PID / $ID"
                continue
              fi

              BODY=$(jq -n \
                --arg Pid "$PID" \
                --arg Id "$ID" \
                --arg User "$USER_VALUE" \
                --arg Password "$PASSWORD_VALUE" \
                '{Pid: $Pid, Id: $Id, User: $User, Password: $Password}')

              HTTP_CODE=$(api_post "UserCredentialParameters" "$BODY")
              fail_on_auth_error "$HTTP_CODE" "POST UserCredentialParameters"

              if [[ "$HTTP_CODE" =~ ^2 ]]; then
                echo "UserCredentialParameter importiert: $PID / $ID"
              else
                echo "WARNING: UserCredentialParameter konnte nicht importiert werden: $PID / $ID"
              fi
            done
          done

          echo "Partner Directory Import in Target CPI abgeschlossen."

      # --- #8 MTAR ALS GITHUB ARTIFACT SICHERN ---
      - name: "#8 Upload MTAR as Artifact"
        uses: actions/upload-artifact@v4
        with:
          name: transport-package
          path: gen/*.mtar

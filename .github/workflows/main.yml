name: Sync iFlows to Git & Deploy via SAP cTMS

on:
  workflow_dispatch:
    inputs:
      package_id:
        description: 'Package ID aus der Integration Suite (z.B. AY)'
        required: true
        default: 'AY'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync-build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # --- 1. REPOSITORY AUSCHECKEN ---
      - name: Checkout this repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # --- 2. AUTHENTIFIZIERUNG GEGEN SOURCE CPI (ENTWICKLUNG) ---
      - name: Get Bearer Token for Source CPI
        id: get-token
        env:
          BTP_CLIENT_ID: ${{ secrets.IAS_CLIENTID }}
          BTP_CLIENT_SECRET: ${{ secrets.IAS_CLIENTSECRET }}
          TOKEN_URL: ${{ vars.BTP_TOKEN_URL }}
        run: |
          echo "Fordere Token von der Source-Instanz an..."
          RESPONSE=$(curl -s -X POST "$TOKEN_URL" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            --data-urlencode "grant_type=client_credentials" \
            --data-urlencode "client_id=$BTP_CLIENT_ID" \
            --data-urlencode "client_secret=$BTP_CLIENT_SECRET")
          
          TOKEN=$(echo "$RESPONSE" | jq -r '.access_token')
          if [ "$TOKEN" == "null" ] || [ -z "$TOKEN" ]; then
            echo "CRITICAL: Auth an Source CPI fehlgeschlagen. Response: $RESPONSE"
            exit 1
          fi
          echo "token=$TOKEN" >> $GITHUB_OUTPUT
      # --- 3. IFLOWS AUTOMATISCH HERUNTERLADEN & ENTPACKEN ---
      - name: Download iFlows from Integration Suite
        env:
          CPI_HOST: ${{ vars.CPI_HOST }}
        run: |
          PACKAGE_ID="${{ github.event.inputs.package_id }}"
          mkdir -p "iflows/$PACKAGE_ID"
          
          echo "Frage verknüpfte iFlows für Paket [$PACKAGE_ID] ab..."
          RESPONSE=$(curl -s \
            "${CPI_HOST}/api/v1/IntegrationPackages('$PACKAGE_ID')/IntegrationDesigntimeArtifacts" \
            -H "Authorization: Bearer ${{ steps.get-token.outputs.token }}" \
            -H "Accept: application/json")
          
          if [[ ! "$RESPONSE" == \{* ]]; then
            echo "CRITICAL: SAP hat kein valides JSON zurückgegeben. Antwort:"
            echo "$RESPONSE"
            exit 1
          fi
          
          IFLOWS=$(echo "$RESPONSE" | jq -r '.d.results[].Id' 2>/dev/null)
          if [ -z "$IFLOWS" ] || [ "$IFLOWS" == "null" ]; then
            echo "CRITICAL: Keine iFlows im Paket $PACKAGE_ID gefunden oder API-Struktur weicht ab."
            echo "$RESPONSE"
            exit 1
          fi
          
          for IFLOW_ID in $IFLOWS; do
            echo "Lade iFlow herunter: $IFLOW_ID"
            curl -s \
              "${CPI_HOST}/api/v1/IntegrationDesigntimeArtifacts(Id='${IFLOW_ID}',Version='active')/\$value" \
              -H "Authorization: Bearer ${{ steps.get-token.outputs.token }}" \
              -o "iflows/$PACKAGE_ID/${IFLOW_ID}.zip"
            
            unzip -o "iflows/$PACKAGE_ID/${IFLOW_ID}.zip" -d "iflows/$PACKAGE_ID/${IFLOW_ID}"
            rm "iflows/$PACKAGE_ID/${IFLOW_ID}.zip"
          done
      # --- 4. GIT COMMIT UND PUSH (MIT REBASE-SCHUTZ) ---
      - name: Commit and Push changes to GitHub
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "github-actions"
          git add iflows/
          
          if git diff --staged --quiet; then
            echo "Keine Änderungen im iFlow-Code festgestellt. Überspringe Push."
          else
            git commit -m "Sync iFlows from package ${{ github.event.inputs.package_id }} [skip ci]"
            git remote set-url origin https://x-access-token:${{ secrets.GHTOKEN }}@github.com/${{ github.repository }}.git
            git pull origin main --rebase
            git push origin main
          fi
      # 5. Build mtar (direkt ohne mbt — CAS-Metadaten-MTAR, kein lokaler Content)
      - name: Build MTA Archive
        env:
          CPI_RESOURCE_IDS: ${{ vars.CPI_RESOURCE_IDS }}
        run: |
          PACKAGE_ID="${{ github.event.inputs.package_id }}"
          RUN_NUMBER="${{ github.run_number }}"
          RESOURCE_ID=$(echo "$CPI_RESOURCE_IDS" | jq -r --arg pkg "$PACKAGE_ID" '.[$pkg] // empty')
          if [ -z "$RESOURCE_ID" ]; then
            echo "CRITICAL: Keine resource-id für Paket [$PACKAGE_ID] in CPI_RESOURCE_IDS hinterlegt."
            exit 1
          fi
          echo "resource-id für [$PACKAGE_ID]: $RESOURCE_ID"
          mkdir -p gen META-INF
          cat > META-INF/mtad.yaml << EOF
          ID: ${PACKAGE_ID}-transport
          description: Transport of CPI package ${PACKAGE_ID} via GitHub Actions
          version: 1.0.${RUN_NUMBER}
          _schema-version: '3.2'
          parameters-metadata: {}
          modules:
          - name: ${PACKAGE_ID}
            parameters-metadata: {}
            properties-metadata: {}
            requires:
            - name: process_integration_transport_instance
              parameters:
                delete-service-key-after-deployment: true
                config:
                  module:
                    name: ${PACKAGE_ID}
                    type: com.sap.integration
                    parameters:
                      resource-type: ContentPackage
                      technical-name: ${PACKAGE_ID}
                      resource-id: ${RESOURCE_ID}
                content-target: true
              parameters-metadata: {}
              properties-metadata: {}
            type: com.sap.integration
          resources:
          - active: true
            optional: false
            name: process_integration_transport_instance
            parameters:
              service-plan: api
              skip-service-updates:
                parameters: true
              service: it-rt
              config:
                roles:
                - WorkspacePackagesTransport
            parameters-metadata: {}
            properties-metadata: {}
            type: org.cloudfoundry.managed-service
          EOF
          cat > META-INF/MANIFEST.MF << EOF
          Manifest-Version: 1.0
          Created-By: GitHub Actions
          MTA-ID: ${PACKAGE_ID}-transport
          MTA-VERSION: 1.0.${RUN_NUMBER}
          EOF
          zip -r "gen/${PACKAGE_ID}-1.0.${RUN_NUMBER}.mtar" META-INF/
          echo "=== mtad.yaml zur Verifikation ==="
          unzip -p "gen/${PACKAGE_ID}-1.0.${RUN_NUMBER}.mtar" META-INF/mtad.yaml
          echo "=== MTAR erstellt ==="
          ls -la gen/*.mtar
      # --- 6. MTAR ALS GIT-ARTIFAKT SICHERN ---
      - name: Upload MTAR as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: transport-package
          path: gen/*.mtar

      # --- 7. DIREKTER ZWEISTUFIGER CTMS UPLOAD & TRANSPORT ERZEUGEN ---
      - name: Upload Built MTAR and Create Transport in cTMS
        env:
          TMS_CLIENT_ID: ${{ secrets.TMS_CLIENT_ID }}
          TMS_CLIENT_SECRET: ${{ secrets.TMS_CLIENT_SECRET }}
          TMS_TOKEN_URL: ${{ vars.TMS_TOKEN_URL }}
          TMS_API_URL: ${{ vars.TMS_URL }}
          NODE_NAME: "ACX_SOURCE"   # Export-Node, nicht Target!
        run: |
          echo "Handshake mit cTMS-Instanz..."
          TOKEN_RAW=$(curl -s -X POST "$TMS_TOKEN_URL" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            --data-urlencode "grant_type=client_credentials" \
            --data-urlencode "client_id=$TMS_CLIENT_ID" \
            --data-urlencode "client_secret=$TMS_CLIENT_SECRET")
          TMS_TOKEN=$(echo "$TOKEN_RAW" | jq -r '.access_token')
          if [ "$TMS_TOKEN" == "null" ] || [ -z "$TMS_TOKEN" ]; then
            echo "CRITICAL: Authentifizierung fehlgeschlagen: $TOKEN_RAW"
            exit 1
          fi
          MTAR_FILE=$(ls gen/*.mtar | head -n 1)
          # STUFE 1: Datei hochladen
          echo "Lade [$MTAR_FILE] in cTMS-Dateispeicher hoch..."
          RESPONSE_FILE=$(mktemp)
          HTTP_CODE=$(curl -s -o "$RESPONSE_FILE" -w "%{http_code}" \
            -X POST "${TMS_API_URL}/v2/files/upload" \
            -H "Authorization: Bearer $TMS_TOKEN" \
            -H "Accept: application/json" \
            -F "file=@$MTAR_FILE")
          BODY=$(cat "$RESPONSE_FILE"); rm "$RESPONSE_FILE"
          if [ "$HTTP_CODE" -ne 201 ] && [ "$HTTP_CODE" -ne 200 ]; then
            echo "CRITICAL: File-Upload abgelehnt. Code: $HTTP_CODE, Body: $BODY"
            exit 1
          fi
          FILE_ID=$(echo "$BODY" | jq -r '.fileId // .id // .Id // empty')
          if [ -z "$FILE_ID" ] || [ "$FILE_ID" == "null" ]; then
            echo "CRITICAL: Keine File-ID erhalten. Body: $BODY"
            exit 1
          fi
          echo "SUCCESS: File-ID ist $FILE_ID"
          # STUFE 2: Transport erzeugen
          # nodeName/contentType/storageType sind TOP-LEVEL, NICHT in entries!
          # uri in entries ist die fileId (Zahl), NICHT der Dateiname!
          echo "Erzeuge Transport-Request auf Node [$NODE_NAME]..."
          PAYLOAD=$(printf \
            '{"nodeName":"%s","contentType":"MTA","storageType":"FILE","entries":[{"uri":"%s"}],"description":"GitHub Actions Deployment"}' \
            "$NODE_NAME" "$FILE_ID")
          ATTACH_RESPONSE=$(mktemp)
          ATTACH_HTTP_CODE=$(curl -s -o "$ATTACH_RESPONSE" -w "%{http_code}" \
            -X POST "${TMS_API_URL}/v2/nodes/export" \
            -H "Authorization: Bearer $TMS_TOKEN" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json" \
            -d "$PAYLOAD")
          ATTACH_BODY=$(cat "$ATTACH_RESPONSE"); rm "$ATTACH_RESPONSE"
          echo "cTMS Antwort-Code: $ATTACH_HTTP_CODE"
          if [ "$ATTACH_HTTP_CODE" -ne 201 ] && [ "$ATTACH_HTTP_CODE" -ne 200 ]; then
            echo "CRITICAL: Transport-Request fehlgeschlagen! Body: $ATTACH_BODY"
            exit 1
          fi
          echo "================================================================"
          echo "Transport erfolgreich erzeugt und in ACX_TARGET eingereiht."
          echo "Details: $ATTACH_BODY"
          echo "================================================================"

name: Sync iFlows to Git & Deploy via SAP cTMS

on:
  workflow_dispatch:
    inputs:
      package_id:
        description: 'Package ID aus der Integration Suite (z.B. AY)'
        required: true
        default: 'AY'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync-build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # --- 1. REPOSITORY AUSCHECKEN ---
      - name: Checkout this repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # --- 2. AUTHENTIFIZIERUNG GEGEN SOURCE CPI (ENTWICKLUNG) ---
      - name: Get Bearer Token for Source CPI
        id: get-token
        env:
          BTP_CLIENT_ID: ${{ secrets.IAS_CLIENTID }}
          BTP_CLIENT_SECRET: ${{ secrets.IAS_CLIENTSECRET }}
          TOKEN_URL: ${{ vars.BTP_TOKEN_URL }}
        run: |
          echo "Fordere Token von der Source-Instanz an..."
          RESPONSE=$(curl -s -X POST "$TOKEN_URL" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            --data-urlencode "grant_type=client_credentials" \
            --data-urlencode "client_id=$BTP_CLIENT_ID" \
            --data-urlencode "client_secret=$BTP_CLIENT_SECRET")
          
          TOKEN=$(echo "$RESPONSE" | jq -r '.access_token')
          if [ "$TOKEN" == "null" ] || [ -z "$TOKEN" ]; then
            echo "CRITICAL: Auth an Source CPI fehlgeschlagen. Response: $RESPONSE"
            exit 1
          fi
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      # --- 3. IFLOWS AUTOMATISCH HERUNTERLADEN & ENTPACKEN ---
      - name: Download iFlows from Integration Suite
        env:
          CPI_HOST: ${{ vars.CPI_HOST }}
        run: |
          PACKAGE_ID="${{ github.event.inputs.package_id }}"
          mkdir -p "iflows/$PACKAGE_ID"
          
          echo "Frage verknüpfte iFlows für Paket [$PACKAGE_ID] ab..."
          RESPONSE=$(curl -s \
            "${CPI_HOST}/api/v1/IntegrationPackages('$PACKAGE_ID')/IntegrationDesigntimeArtifacts" \
            -H "Authorization: Bearer ${{ steps.get-token.outputs.token }}" \
            -H "Accept: application/json")
          
          if [[ ! "$RESPONSE" == \{* ]]; then
            echo "CRITICAL: SAP hat kein valides JSON zurückgegeben. Antwort:"
            echo "$RESPONSE"
            exit 1
          fi
          
          IFLOWS=$(echo "$RESPONSE" | jq -r '.d.results[].Id' 2>/dev/null)
          if [ -z "$IFLOWS" ] || [ "$IFLOWS" == "null" ]; then
            echo "CRITICAL: Keine iFlows im Paket $PACKAGE_ID gefunden oder API-Struktur weicht ab."
            echo "$RESPONSE"
            exit 1
          fi
          
          for IFLOW_ID in $IFLOWS; do
            echo "Lade iFlow herunter: $IFLOW_ID"
            curl -s \
              "${CPI_HOST}/api/v1/IntegrationDesigntimeArtifacts(Id='${IFLOW_ID}',Version='active')/\$value" \
              -H "Authorization: Bearer ${{ steps.get-token.outputs.token }}" \
              -o "iflows/$PACKAGE_ID/${IFLOW_ID}.zip"
            
            unzip -o "iflows/$PACKAGE_ID/${IFLOW_ID}.zip" -d "iflows/$PACKAGE_ID/${IFLOW_ID}"
            rm "iflows/$PACKAGE_ID/${IFLOW_ID}.zip"
          done

      # --- 4. GIT COMMIT UND PUSH (MIT REBASE-SCHUTZ) ---
      - name: Commit and Push changes to GitHub
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "github-actions"
          git add iflows/
          
          if git diff --staged --quiet; then
            echo "Keine Änderungen im iFlow-Code festgestellt. Überspringe Push."
          else
            git commit -m "Sync iFlows from package ${{ github.event.inputs.package_id }} [skip ci]"
            git remote set-url origin https://x-access-token:${{ secrets.GHTOKEN }}@github.com/${{ github.repository }}.git
            git pull origin main --rebase
            git push origin main
          fi

      # --- 5. EXPORT VIA CAS → cTMS ---
      # CAS übernimmt vollständig: MTAR bauen, in cTMS hochladen, Transport-Request anlegen.
      # exportMode=TransportManagementService → Step 7 (manueller cTMS-Upload) entfällt.
      # resourceID wird dynamisch via /v1/contentResources ermittelt → CPI_RESOURCE_IDS entfällt.
      - name: Export Package via CAS and push to cTMS
        env:
          CAS_CLIENT_ID: ${{ secrets.CAS_CLIENT_ID }}
          CAS_CLIENT_SECRET: ${{ secrets.CAS_CLIENT_SECRET }}
          CAS_TOKEN_URL: ${{ vars.CAS_TOKEN_URL }}
          CAS_API_URL: ${{ vars.CAS_API_URL }}
        run: |
          PACKAGE_ID="${{ github.event.inputs.package_id }}"
          RUN_NUMBER="${{ github.run_number }}"
          mkdir -p gen

          # --- AUTH ---
          echo "Fordere CAS-Token an..."
          CAS_TOKEN_RAW=$(curl -s -X POST "$CAS_TOKEN_URL" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            --data-urlencode "grant_type=client_credentials" \
            --data-urlencode "client_id=$CAS_CLIENT_ID" \
            --data-urlencode "client_secret=$CAS_CLIENT_SECRET")
          CAS_TOKEN=$(echo "$CAS_TOKEN_RAW" | jq -r '.access_token')
          if [ "$CAS_TOKEN" == "null" ] || [ -z "$CAS_TOKEN" ]; then
            echo "CRITICAL: CAS Auth fehlgeschlagen: $CAS_TOKEN_RAW"
            exit 1
          fi
          echo "CAS Token erhalten."

          # --- TMS-VERBINDUNG PRÜFEN (Diagnose) ---
          echo "Prüfe CAS → TMS Verbindung und verfügbare Source-Nodes..."
          TMS_MODE_RESPONSE=$(curl -s \
            "${CAS_API_URL}/v1/transportModes" \
            -H "Authorization: Bearer $CAS_TOKEN" \
            -H "Accept: application/json")
          echo "Transport Modes: $TMS_MODE_RESPONSE"
          # sourceNode=ACX_SOURCE muss in der Liste der sourceNodes auftauchen.
          # Falls nicht → CAS-TMS-Destination prüfen (BTP Cockpit → Destinations).

          # --- RESOURCE-ID DYNAMISCH ERMITTELN ---
          # CAS kennt alle Pakete des Tenants. Wir filtern nach PACKAGE_ID.
          echo "Ermittle resourceID für Paket [$PACKAGE_ID]..."
          RESOURCES_RESPONSE=$(curl -s \
            "${CAS_API_URL}/v1/contentResources" \
            -H "Authorization: Bearer $CAS_TOKEN" \
            -H "Accept: application/json")
          echo "CAS contentResources Response: $RESOURCES_RESPONSE"

          RESOURCE_ID=$(echo "$RESOURCES_RESPONSE" | \
            jq -r --arg pkg "$PACKAGE_ID" \
            '.contentResources[] | select(.id == $pkg) | .resourceID')
          RESOURCE_TYPE=$(echo "$RESOURCES_RESPONSE" | \
            jq -r --arg pkg "$PACKAGE_ID" \
            '.contentResources[] | select(.id == $pkg) | .type')
          RESOURCE_SUBTYPE=$(echo "$RESOURCES_RESPONSE" | \
            jq -r --arg pkg "$PACKAGE_ID" \
            '.contentResources[] | select(.id == $pkg) | .subType')
          RESOURCE_NAME=$(echo "$RESOURCES_RESPONSE" | \
            jq -r --arg pkg "$PACKAGE_ID" \
            '.contentResources[] | select(.id == $pkg) | .name')

          if [ -z "$RESOURCE_ID" ] || [ "$RESOURCE_ID" == "null" ]; then
            echo "CRITICAL: Paket [$PACKAGE_ID] nicht in CAS contentResources gefunden."
            echo "Verfügbare Pakete:"
            echo "$RESOURCES_RESPONSE" | jq -r '.contentResources[] | "\(.id) | \(.type)/\(.subType) | \(.resourceID)"'
            exit 1
          fi
          echo "resourceID: $RESOURCE_ID | type: $RESOURCE_TYPE | subType: $RESOURCE_SUBTYPE"

          # --- EXPORT-JOB STARTEN ---
          # "id" (= activityId laut Schema) und "exportType" sind required,
          # fehlten bisher → 400 "id: should not be empty."
          # Pattern für id: alphanumerisch + [_,-,.], max 40 Zeichen
          EXPORT_PAYLOAD=$(jq -n \
            --arg id "gh-${PACKAGE_ID}-${RUN_NUMBER}" \
            --arg pkg "$PACKAGE_ID" \
            --arg name "$RESOURCE_NAME" \
            --arg resourceId "$RESOURCE_ID" \
            --arg type "$RESOURCE_TYPE" \
            --arg subType "$RESOURCE_SUBTYPE" \
            --arg runNum "$RUN_NUMBER" \
            '{
              "id": $id,
              "exportType": "MTAR",
              "exportMode": "TransportManagementService",
              "exportMediaType": "MTAR",
              "sourceNode": "ACX_SOURCE",
              "version": ("1.0." + $runNum),
              "description": ("GitHub Actions - Run " + $runNum),
              "requestor": "GitHub Actions",
              "contentResources": [{
                "resourceID": $resourceId,
                "type": $type,
                "subType": $subType,
                "id": $pkg,
                "name": $name,
                "version": ("1.0." + $runNum)
              }]
            }')

          # Payload zur Diagnose ausgeben (kein Secret darin)
          echo "Export Payload: $EXPORT_PAYLOAD"

          echo "Starte CAS Export-Job für Paket [$PACKAGE_ID]..."
          EXPORT_RESPONSE=$(curl -s -X POST "${CAS_API_URL}/v1/contentResources/export" \
            -H "Authorization: Bearer $CAS_TOKEN" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json" \
            -d "$EXPORT_PAYLOAD")
          echo "CAS Export Response: $EXPORT_RESPONSE"

          ACTIVITY_ID=$(echo "$EXPORT_RESPONSE" | jq -r '.activityId // empty')
          if [ -z "$ACTIVITY_ID" ] || [ "$ACTIVITY_ID" == "null" ]; then
            echo "CRITICAL: Keine activityId von CAS erhalten."
            exit 1
          fi
          echo "CAS Export-Job gestartet. activityId: $ACTIVITY_ID"

          # --- POLLEN BIS FINISHED ---
          # Endzustände laut API-Doku: FINISHED, WARNING, ERROR, ABORTED
          # Maximal 30 × 20s = 10 Minuten Timeout
          MAX_ATTEMPTS=30
          SLEEP_SECONDS=20
          STATE="UNKNOWN"
          for i in $(seq 1 $MAX_ATTEMPTS); do
            echo "Poll $i/$MAX_ATTEMPTS — warte ${SLEEP_SECONDS}s..."
            sleep $SLEEP_SECONDS
            POLL_RESPONSE=$(curl -s \
              "${CAS_API_URL}/v1/operations/${ACTIVITY_ID}" \
              -H "Authorization: Bearer $CAS_TOKEN" \
              -H "Accept: application/json")
            STATE=$(echo "$POLL_RESPONSE" | jq -r '.state // empty')
            PROGRESS=$(echo "$POLL_RESPONSE" | jq -r '.progress // "?"')
            echo "State: $STATE | Progress: ${PROGRESS}%"
            if [ "$STATE" == "FINISHED" ] || [ "$STATE" == "WARNING" ]; then
              echo "Export abgeschlossen mit Status: $STATE"
              break
            elif [ "$STATE" == "ERROR" ] || [ "$STATE" == "ABORTED" ]; then
              echo "CRITICAL: CAS Export fehlgeschlagen. Vollständige Antwort:"
              echo "$POLL_RESPONSE"
              exit 1
            fi
          done
          if [ "$STATE" != "FINISHED" ] && [ "$STATE" != "WARNING" ]; then
            echo "CRITICAL: Timeout nach $((MAX_ATTEMPTS * SLEEP_SECONDS))s. Letzter State: $STATE"
            exit 1
          fi

          # --- OPERATION CONFIG: fileID + cTMS Transport-Request-Info ---
          CONFIG_RESPONSE=$(curl -s \
            "${CAS_API_URL}/v1/operations/${ACTIVITY_ID}/config" \
            -H "Authorization: Bearer $CAS_TOKEN" \
            -H "Accept: application/json")
          echo "Operation Config: $CONFIG_RESPONSE"

          FILE_ID=$(echo "$CONFIG_RESPONSE" | jq -r '.fileID // empty')
          TR_ID=$(echo "$CONFIG_RESPONSE" | jq -r '.transportRequestID // "N/A"')
          TR_URL=$(echo "$CONFIG_RESPONSE" | jq -r '.transportRequestURL // "N/A"')

          echo "================================================================"
          echo "CAS Export + cTMS Transport erfolgreich abgeschlossen."
          echo "cTMS Transport-Request ID : $TR_ID"
          echo "cTMS Transport-Request URL: $TR_URL"
          echo "================================================================"

          # --- MTAR HERUNTERLADEN (für Artifact-Archivierung in Step 6) ---
          if [ -n "$FILE_ID" ] && [ "$FILE_ID" != "null" ]; then
            MTAR_FILE="gen/${PACKAGE_ID}-1.0.${RUN_NUMBER}.mtar"
            echo "Lade MTAR herunter (fileID: $FILE_ID)..."
            HTTP_CODE=$(curl -s -o "$MTAR_FILE" -w "%{http_code}" \
              "${CAS_API_URL}/v1/operations/${ACTIVITY_ID}/file/${FILE_ID}" \
              -H "Authorization: Bearer $CAS_TOKEN" \
              -H "Accept: application/octet-stream")
            if [ "$HTTP_CODE" -ne 200 ]; then
              echo "WARNING: MTAR-Download fehlgeschlagen (HTTP $HTTP_CODE) — Artifact wird übersprungen."
              rm -f "$MTAR_FILE"
            else
              echo "=== Inhalt des heruntergeladenen MTAR ==="
              unzip -l "$MTAR_FILE"
              ls -la gen/*.mtar
            fi
          else
            echo "Keine fileID in Operation Config — MTAR-Download übersprungen."
          fi

      # --- 6. MTAR ALS GIT-ARTIFAKT SICHERN ---
      - name: Upload MTAR as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: transport-package
          path: gen/*.mtar

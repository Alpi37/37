name: SAP Integration Suite Direct Sync & Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  sync-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # --- 1. REPOSITORY AUSCHECKEN ---
      - name: Checkout Repository
        uses: actions/checkout@v4

      # --- 2. AUTHENTIFIZIERUNG GEGEN SOURCE CPI (Verwendung der IAS-Credentials) ---
      - name: Authenticate against Source CPI
        id: source_auth
        env:
          CPI_CLIENT_ID: ${{ secrets.IAS_CLIENTID }}
          CPI_CLIENT_SECRET: ${{ secrets.IAS_CLIENTSECRET }}
          TOKEN_URL: ${{ vars.BTP_TOKEN_URL }}
        run: |
          if [ -z "$CPI_CLIENT_ID" ] || [ -z "$CPI_CLIENT_SECRET" ]; then
            echo "CRITICAL: Secrets für IAS_CLIENTID oder IAS_CLIENTSECRET sind in GitHub nicht gesetzt!"
            exit 1
          fi

          RESPONSE=$(curl -s -X POST "$TOKEN_URL" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            --data-urlencode "grant_type=client_credentials" \
            --data-urlencode "client_id=$CPI_CLIENT_ID" \
            --data-urlencode "client_secret=$CPI_CLIENT_SECRET")
          
          TOKEN=$(echo "$RESPONSE" | jq -r '.access_token')
          if [ "$TOKEN" == "null" ] || [ -z "$TOKEN" ]; then
            echo "Source Auth failed: $RESPONSE"
            exit 1
          fi
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      # --- 3. IFLOW AUS SOURCE HOCHLADEN & IM REPO SPEICHERN ---
      - name: Fetch iFlow from Source
        env:
          CPI_HOST: ${{ vars.CPI_HOST }}
        run: |
          PACKAGE_ID="AY"
          IFLOW_ID="ay-package-content"
          mkdir -p "iflows/$PACKAGE_ID"
          
          echo "Lade iFlow $IFLOW_ID aus Paket $PACKAGE_ID..."
          curl -s \
            "${CPI_HOST}/api/v1/IntegrationDesigntimeArtifacts(Id='${IFLOW_ID}',Version='active')/\$value" \
            -H "Authorization: Bearer ${{ steps.source_auth.outputs.token }}" \
            -o "iflows/$PACKAGE_ID/${IFLOW_ID}.zip"
          
          # Entpacken für die Git-History
          unzip -o "iflows/$PACKAGE_ID/${IFLOW_ID}.zip" -d "iflows/$PACKAGE_ID/${IFLOW_ID}"

      # --- 4. ÄNDERUNGEN INS GIT REPOSITORY PUSHEN ---
      - name: Commit and Push to GitHub
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "github-actions"
          git add iflows/
          
          if git diff --staged --quiet; then
            echo "Keine Änderungen im iFlow festgestellt."
          else
            git commit -m "Sync iFlow from Source [skip ci]"
            git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
            git push origin main
          fi

      # --- 5. AUTHENTIFIZIERUNG GEGEN TARGET cTMS / BTP ---
      - name: Authenticate against Target cTMS
        id: target_auth
        env:
          TMS_CLIENT_ID: ${{ secrets.TMS_CLIENT_ID }}
          TMS_CLIENT_SECRET: ${{ secrets.TMS_CLIENT_SECRET }}
          TOKEN_URL: ${{ vars.BTP_TOKEN_URL }}
        run: |
          if [ -z "$TMS_CLIENT_ID" ] || [ -z "$TMS_CLIENT_SECRET" ]; then
            echo "CRITICAL: Secrets für TMS_CLIENT_ID oder TMS_CLIENT_SECRET sind in GitHub nicht gesetzt!"
            exit 1
          fi

          RESPONSE=$(curl -s -X POST "$TOKEN_URL" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            --data-urlencode "grant_type=client_credentials" \
            --data-urlencode "client_id=$TMS_CLIENT_ID" \
            --data-urlencode "client_secret=$TMS_CLIENT_SECRET")
          
          TOKEN=$(echo "$RESPONSE" | jq -r '.access_token')
          if [ "$TOKEN" == "null" ] || [ -z "$TOKEN" ]; then
            echo "Target Auth failed: $RESPONSE"
            exit 1
          fi
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      # --- 6. DIREKTES DEPLOYMENT DES ZIP-ARTEFAKTS INS TARGET ---
      - name: Deploy Direct ZIP to Target via cTMS
        env:
          NODE_NAME: "ACX_TARGET" # Bleibt fest auf Target oder nutze ggf. ${{ vars.TMS_NODE_NAME }}, falls du in den Source-Node pushen willst
          TMS_API_URL: ${{ vars.TMS_URL }}
        run: |
          PACKAGE_ID="AY"
          IFLOW_ID="ay-package-content"
          ZIP_PATH="iflows/$PACKAGE_ID/${IFLOW_ID}.zip"
          ZIP_NAME="${IFLOW_ID}.zip"
          
          echo "Sende Direkt-ZIP an cTMS Target-Node [$NODE_NAME]: $ZIP_PATH"
          RESPONSE_FILE=$(mktemp)
          
          HTTP_CODE=$(curl -s -o "$RESPONSE_FILE" -w "%{http_code}" -X POST "${TMS_API_URL}/v1/nodes/upload?nodeName=${NODE_NAME}" \
            -H "Authorization: Bearer ${{ steps.target_auth.outputs.token }}" \
            -F "file=@${ZIP_PATH};filename=${ZIP_NAME};type=application/zip" \
            --fail-with-body)
          
          BODY=$(cat "$RESPONSE_FILE")
          rm "$RESPONSE_FILE"
          
          echo "cTMS Response Code: $HTTP_CODE"
          echo "cTMS Response Body: $BODY"
          
          if [ "$HTTP_CODE" -ne 201 ] && [ "$HTTP_CODE" -ne 200 ]; then
            echo "CRITICAL: Target Deployment über cTMS fehlgeschlagen!"
            exit 1
          fi
          
          echo "SUCCESS: iFlow wurde erfolgreich via ZIP ins Target transportiert!"

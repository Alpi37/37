name: Sync iFlows to Git

on:
    workflow_dispatch:
      inputs:
        package_id:
          description: 'Package ID from Integration Suite (e.g., AY)'
          required: true
          default: 'AY'

jobs:
    sync:
      runs-on: ubuntu-latest
      permissions:
        contents: write

      steps:
         - name: Checkout this repo
           uses: actions/checkout@v4

         - name: Get Bearer Token from XSUAA
           id: get-token
           run: |
            TOKEN=$(curl -s -X POST "${{ vars.BTP_TOKEN_URL }}" \
              -H "Content-Type: application/x-www-form-urlencoded" \
              --data-urlencode "grant_type=client_credentials" \
              --data-urlencode "client_id=${{ secrets.BTP_API_CLIENT_ID }}" \
              --data-urlencode "client_secret=${{ secrets.BTP_API_CLIENT_SECRET }}" \
              | jq -r '.access_token')
            if [ "$TOKEN" == "null" ] || [ -z "$TOKEN" ]; then echo "Authentication failed. Check your BTP Secrets."; exit 1; fi
            echo "token=$TOKEN" >> $GITHUB_OUTPUT

         - name: Download and Extract iFlows
           run: |
            PACKAGE_ID="${{ github.event.inputs.package_id }}"
            mkdir -p "iflows/$PACKAGE_ID"

            echo "Fetching iFlow list for package: $PACKAGE_ID"

            IFLOW_LIST=$(curl -s \
              "${{ vars.CPI_HOST }}/api/v1/IntegrationPackages('$PACKAGE_ID')/IntegrationDesigntimeArtifacts" \
              -H "Authorization: Bearer ${{ steps.get-token.outputs.token }}" \
              -H "Accept: application/json")

            IFLOWS=$(echo "$IFLOW_LIST" | jq -r '.d.results[].Id')

            if [ -z "$IFLOWS" ] || [ "$IFLOWS" == "null" ]; then
              echo "No iFlows found. Check your Package ID and CPI_HOST variable."
              exit 1
            fi

            for IFLOW_ID in $IFLOWS; do
              echo "Processing: $IFLOW_ID"
              curl -s \
                "${{ vars.CPI_HOST }}/api/v1/IntegrationDesigntimeArtifacts(Id='${IFLOW_ID}',Version='active')/\$value" \
                -H "Authorization: Bearer ${{ steps.get-token.outputs.token }}" \
                -o "temp_$IFLOW_ID.zip"

              unzip -o "temp_$IFLOW_ID.zip" -d "iflows/$PACKAGE_ID/$IFLOW_ID"
              rm "temp_$IFLOW_ID.zip"
            done

         - name: Commit and Push to GitHub
           run: |
            git config user.email "github-actions@github.com"
            git config user.name "github-actions"
            git add iflows/
            if git diff --staged --quiet; then
              echo "No changes detected. Repository is already up to date."
            else
              git commit -m "Sync: iFlows from package ${{ github.event.inputs.package_id }}"
              git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
              git push
            fi

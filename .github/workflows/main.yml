name: SAP Integration Suite Direct Sync & Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  sync-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # --- 1. REPOSITORY AUSCHECKEN ---
      - name: Checkout Repository
        uses: actions/checkout@v4

      # --- 2. AUTHENTIFIZIERUNG GEGEN SOURCE CPI (IAS-Credentials) ---
      - name: Authenticate against Source CPI
        id: source_auth
        env:
          CPI_CLIENT_ID: ${{ secrets.IAS_CLIENTID }}
          CPI_CLIENT_SECRET: ${{ secrets.IAS_CLIENTSECRET }}
          TOKEN_URL: ${{ vars.BTP_TOKEN_URL }}
        run: |
          RESPONSE=$(curl -s -X POST "$TOKEN_URL" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            --data-urlencode "grant_type=client_credentials" \
            --data-urlencode "client_id=$CPI_CLIENT_ID" \
            --data-urlencode "client_secret=$CPI_CLIENT_SECRET")
          
          TOKEN=$(echo "$RESPONSE" | jq -r '.access_token')
          if [ "$TOKEN" == "null" ] || [ -z "$TOKEN" ]; then
            echo "Source Auth failed: $RESPONSE"
            exit 1
          fi
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      # --- 3. IFLOWS DYNAMISCH AUS SOURCE LESEN & SPEICHERN ---
      - name: Fetch iFlows from Source
        env:
          CPI_HOST: ${{ vars.CPI_HOST }}
        run: |
          PACKAGE_ID="AY"
          mkdir -p "iflows/$PACKAGE_ID"
          
          echo "Frage verknüpfte iFlows für Paket [$PACKAGE_ID] ab..."
          RESPONSE=$(curl -s \
            "${CPI_HOST}/api/v1/IntegrationPackages('$PACKAGE_ID')/IntegrationDesigntimeArtifacts" \
            -H "Authorization: Bearer ${{ steps.source_auth.outputs.token }}" \
            -H "Accept: application/json")
          
          if [[ ! "$RESPONSE" == \{* ]]; then
            echo "CRITICAL: SAP hat kein JSON zurückgegeben. Fehlermeldung der API:"
            echo "$RESPONSE"
            exit 1
          fi
          
          IFLOWS=$(echo "$RESPONSE" | jq -r '.d.results[].Id' 2>/dev/null)
          if [ -z "$IFLOWS" ] || [ "$IFLOWS" == "null" ]; then
            echo "CRITICAL: Keine iFlows im Paket $PACKAGE_ID gefunden oder API-Struktur weicht ab. Antwort:"
            echo "$RESPONSE"
            exit 1
          fi
          
          for IFLOW_ID in $IFLOWS; do
            echo "Gefundenen iFlow herunterladen: $IFLOW_ID"
            
            RESPONSE_FILE=$(mktemp)
            HTTP_CODE=$(curl -s -o "$RESPONSE_FILE" -w "%{http_code}" \
              "${CPI_HOST}/api/v1/IntegrationDesigntimeArtifacts(Id='${IFLOW_ID}',Version='active')/\$value" \
              -H "Authorization: Bearer ${{ steps.source_auth.outputs.token }}")
            
            if [ "$HTTP_CODE" -ne 200 ]; then
              echo "Fehler beim Download von $IFLOW_ID (HTTP $HTTP_CODE):"
              cat "$RESPONSE_FILE"
              rm "$RESPONSE_FILE"
              exit 1
            fi
            
            mv "$RESPONSE_FILE" "iflows/$PACKAGE_ID/${IFLOW_ID}.zip"
            
            # Entpacken für die Git-History
            unzip -o "iflows/$PACKAGE_ID/${IFLOW_ID}.zip" -d "iflows/$PACKAGE_ID/${IFLOW_ID}"
            
            # Exportiere die ID für den späteren Deployment-Schritt
            echo "LAST_DEPLOYED_IFLOW=$IFLOW_ID" >> $GITHUB_ENV
          done

      # --- 4. ÄNDERUNGEN INS GIT REPOSITORY PUSHEN ---
      - name: Commit and Push to GitHub
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "github-actions"
          git add iflows/
          
          if git diff --staged --quiet; then
            echo "Keine Änderungen im iFlow festgestellt."
          else
            git commit -m "Sync iFlow from Source [skip ci]"
            git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
            git push origin main
          fi

      # --- 5. AUTHENTIFIZIERUNG GEGEN TARGET cTMS / BTP ---
      - name: Authenticate against Target cTMS
        id: target_auth
        env:
          TMS_CLIENT_ID: ${{ secrets.TMS_CLIENT_ID }}
          TMS_CLIENT_SECRET: ${{ secrets.TMS_CLIENT_SECRET }}
          TOKEN_URL: ${{ vars.TMS_TOKEN_URL }}/oauth/token
        run: |
          RESPONSE=$(curl -s -X POST "$TOKEN_URL" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            --data-urlencode "grant_type=client_credentials" \
            --data-urlencode "client_id=$TMS_CLIENT_ID" \
            --data-urlencode "client_secret=$TMS_CLIENT_SECRET")
          
          TOKEN=$(echo "$RESPONSE" | jq -r '.access_token')
          if [ "$TOKEN" == "null" ] || [ -z "$TOKEN" ]; then
            echo "Target Auth failed: $RESPONSE"
            exit 1
          fi
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      # --- 6. DIREKTES DEPLOYMENT DES ZIP-ARTEFAKTS INS TARGET VIA cTMS ---
      - name: Deploy Direct ZIP to Target via cTMS
        env:
          NODE_NAME: "ACX_TARGET" # <-- BITTE PRÜFEN: Heißt dein Node in cTMS exakt so?
          TMS_API_URL: ${{ vars.TMS_URL }}
        run: |
          PACKAGE_ID="AY"
          IFLOW_ID="${{ env.LAST_DEPLOYED_IFLOW }}"
          ZIP_PATH="iflows/$PACKAGE_ID/${IFLOW_ID}.zip"
          ZIP_NAME="${IFLOW_ID}.zip"
          
          if [ -z "$IFLOW_ID" ]; then
            echo "CRITICAL: Es wurde keine iFlow-ID für den Transport übergeben!"
            exit 1
          fi
          
          echo "Sende Direkt-ZIP an cTMS Target-Node [$NODE_NAME]: $ZIP_PATH"
          RESPONSE_FILE=$(mktemp)
          
          # Wir entfernen temporär das harte --fail, um den echten SAP-Fehler im BODY zu fangen
          HTTP_CODE=$(curl -s -o "$RESPONSE_FILE" -w "%{http_code}" -X POST "${TMS_API_URL}/v1/nodes/upload?nodeName=${NODE_NAME}" \
            -H "Authorization: Bearer ${{ steps.target_auth.outputs.token }}" \
            -F "file=@${ZIP_PATH};filename=${ZIP_NAME};type=application/zip")
          
          BODY=$(cat "$RESPONSE_FILE")
          rm "$RESPONSE_FILE"
          
          echo "cTMS Response Code: $HTTP_CODE"
          echo "cTMS Response Body: $BODY"
          
          # Hier prüfen wir den HTTP-Code manuell, damit das Log vorher gedruckt wird
          if [ "$HTTP_CODE" -ne 201 ] && [ "$HTTP_CODE" -ne 200 ]; then
            echo "CRITICAL: Target Deployment über cTMS fehlgeschlagen! Grund siehe cTMS Response Body oben."
            exit 1
          fi
          
          echo "SUCCESS: iFlow [$IFLOW_ID] wurde erfolgreich via ZIP ins Target transportiert!"

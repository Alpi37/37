name: Sync iFlows to Git

on:
  workflow_dispatch:
    inputs:
      package_id:
        description: 'Package ID from Integration Suite'
        required: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GIT_TOKEN }}

      - name: Sync iFlows from CPI
        uses: engswee/flashpipe-action/sync@v1
        with:
          tmn-host: ${{ vars.BTP_API_URL }}
          oauth-clientid: ${{ secrets.BTP_API_CLIENT_ID }}
          oauth-clientsecret: ${{ secrets.BTP_API_CLIENT_SECRET }}
          oauth-tokenendpoint: ${{ vars.BTP_TOKEN_URL }}
          package-id: ${{ github.event.inputs.package_id }}
          package-name: ${{ github.event.inputs.package_id }}
          dir-artifacts-relative: iflows
          git-user-email: github-actions@github.com
          git-user-name: github-actions
          token: ${{ secrets.GIT_TOKEN }}

_schema-version: 3.3.0
ID: integration-suite-packages
version: 1.0.0
description: "IntSuite iFlows"

modules:
  - name: ay-package-content
    type: com.sap.integration.suite.package
    path: iflows/AY
    parameters:
      service-key-name: AY
    requires:
      - name: integration-suite-instance

resources:
  - name: integration-suite-instance
    type: org.cloudfoundry.managed-service
    parameters:
      service: it-rt
      service-plan: api

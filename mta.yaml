_schema-version: 3.3.0
ID: cap-minimal
version: 1.0.0
description: "Combined Project"

parameters:
  enable-parallel-deployments: true

build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm ci
        - npx cds build --production

modules:
  - name: cap-minimal-srv
    type: nodejs
    path: gen/srv
    parameters:
      instances: 1
      buildpack: nodejs_buildpack
    build-parameters:
      builder: npm-ci
    provides:
      - name: srv-api
        properties:
          srv-url: ${default-url}

  - name: integration-content-ay
    type: com.sap.integration.suite.package
    path: iflows/AY
    parameters:
      service-key-name: default_key
